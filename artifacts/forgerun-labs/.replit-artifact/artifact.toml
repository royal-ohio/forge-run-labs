kind = "web"
previewPath = "/"
title = "ForgeRun Labs"
version = "1.0.0"
id = "artifacts/forgerun-labs"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23958

[services.development]
run = "pnpm --filter @workspace/forgerun-labs run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/forgerun-labs", "run", "build" ]
publicDir = "artifacts/forgerun-labs/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23958"
BASE_PATH = "/"
