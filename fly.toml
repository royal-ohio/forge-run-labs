app = "realityos-forge-run-labs"
primary_region = "ord"

[build]

[env]
  REPO_NAME = "forge-run-labs"
  BRAIN_HUB_URL = "https://realityos-node-a.fly.dev"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[checks]
  [checks.health]
    type = "http"
    port = 8080
    path = "/healthz"
    interval = "30s"
    timeout = "5s"
