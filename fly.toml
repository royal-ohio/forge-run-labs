app = "realityos-forge-run-labs"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]

[env]
  PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.checks]
    interval = "30s"
    timeout = "10s"
    grace_period = "120s"

[restart]
  policy = "always"
  max_retries = 5

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
